name: CI - Build & Test

on:
  pull_request:
    branches:
      - development
      - master
  push:
    branches:
      - development
      - feature/**

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run tests with coverage
      run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory TestResults -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.1

    - name: Generate coverage report
      run: |
        COVERAGE_FILE=$(find TestResults -name 'coverage.cobertura.xml' | head -1)
        reportgenerator "-reports:$COVERAGE_FILE" "-targetdir:CoverageReport" "-reporttypes:Html;HtmlSummary;TextSummary"

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: CoverageReport/
        retention-days: 14
